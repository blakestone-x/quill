<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1812"/>
      <stop offset="100%" stop-color="#13100d"/>
    </linearGradient>
    <linearGradient id="quill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcb05a"/>
      <stop offset="100%" stop-color="#a87d2a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- mic body suggesting both quill nib and microphone -->
  <g transform="translate(256 256)">
    <path d="M 0 -150
             L 60 -90
             L 60 60
             A 60 60 0 0 1 -60 60
             L -60 -90 Z"
          fill="url(#quill)"
          stroke="#dcb05a"
          stroke-width="6"
          stroke-linejoin="round"/>
    <line x1="0" y1="60" x2="0" y2="120" stroke="#dcb05a" stroke-width="10" stroke-linecap="round"/>
    <line x1="-40" y1="120" x2="40" y2="120" stroke="#dcb05a" stroke-width="10" stroke-linecap="round"/>
    <!-- nib detail -->
    <line x1="0" y1="-150" x2="0" y2="-50" stroke="#1c1812" stroke-width="4" stroke-linecap="round"/>
    <!-- recording dot -->
    <circle cx="0" cy="0" r="14" fill="#d97a8a" opacity="0.9"/>
  </g>
</svg>
